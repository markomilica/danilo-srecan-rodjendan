<!DOCTYPE html>
<html lang="sr">

<head>
<meta charset="UTF-8">
<title>Danilo</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Срећан рођендан Данило 🎉</h1>

<div class="card" onclick="flipCard()">

<div class="card-inner" id="card">

<div class="card-front">
<img src="danilo.jpg">
</div>

<div class="card-back">
<video controls>
<source src="danilo.mp4" type="video/mp4">
</video>
</div>

</div>

</div>

<script>

function flipCard() {

document.getElementById("card").classList.toggle("flip");

}

</script>

</body>
</html>
